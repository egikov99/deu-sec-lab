name: Build and publish Docker images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ghcr.io/egikov99/deu-sec-lab-api:latest
      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ghcr.io/egikov99/deu-sec-lab-web:latest
      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: worker/Dockerfile
          push: true
          tags: ghcr.io/egikov99/deu-sec-lab-worker:latest
          build-args: |
            CLAUDE_BUGHUNTER_REPO=${{ vars.CLAUDE_BUGHUNTER_REPO }}
            CLAUDE_BUGHUNTER_REF=${{ vars.CLAUDE_BUGHUNTER_REF || 'main' }}
