services:
  security-lab:
    image: ghcr.io/egikov/deu-sec-lab:latest
    container_name: deu-security-lab
    restart: unless-stopped
    env_file:
      - stack.env
    stdin_open: true
    tty: true
    volumes:
      - workspace:/workspace
      - reports:/reports
      - results:/results
      - nuclei-data:/root/.local/share/nuclei
      - codex-data:/root/.codex

volumes:
  workspace:
  reports:
  results:
  nuclei-data:
  codex-data:
