services:
  api:
    image: ghcr.io/egikov99/deu-sec-lab-api:latest
    container_name: deu-sec-lab-api
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./reports:/reports
    ports:
      - '8000:8000'
    depends_on:
      - redis

  web:
    image: ghcr.io/egikov99/deu-sec-lab-web:latest
    container_name: deu-sec-lab-web
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      - api

  worker:
    image: ghcr.io/egikov99/deu-sec-lab-worker:latest
    container_name: deu-sec-lab-worker
    env_file:
      - .env
    volumes:
      - ./reports:/reports
      - ./data:/data
    depends_on:
      - api
      - redis

  redis:
    image: redis:7-alpine
    container_name: deu-sec-lab-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

volumes:
  redis-data:
