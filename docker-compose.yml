services:
  security-lab:
    image: ghcr.io/egikov99/deu-sec-lab:latest
    container_name: deu-security-lab
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5}
      TZ: ${TZ:-Europe/Warsaw}
    stdin_open: true
    tty: true
    volumes:
      - workspace:/workspace
      - reports:/reports
      - results:/results
      - nuclei-data:/root/.local/share/nuclei
      - codex-data:/root/.codex

  security-api:
    build:
      context: .
      dockerfile: security-api/Dockerfile
    container_name: deu-security-api
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      TZ: ${TZ:-Europe/Warsaw}
    volumes:
      - workspace:/workspace
      - reports:/reports
      - results:/results
      - nuclei-data:/root/.local/share/nuclei

volumes:
  workspace:
  reports:
  results:
  nuclei-data:
  codex-data: